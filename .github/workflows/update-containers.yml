name: Update tenant containers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger container updates
        run: |
          curl -sf -X POST "https://${{ secrets.CONTROL_PLANE_URL }}/tenants/update-all" \
            -H "Authorization: Bearer ${{ secrets.CONTROL_PLANE_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}'
